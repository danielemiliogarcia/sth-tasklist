name: CI

on:
  # push: # tests your branch as-is
  pull_request: # tests "what would happen if this merged right now in a temporary merge commit"

  # Uncomment below (and remove the bare triggers above) to restrict to specific branches:
  # push:
  #   branches: [main, dev]
  # pull_request:
  #   branches: [main, dev]

env:
  CARGO_TERM_COLOR: always

# Jobs Parallelization is on purpose to have a complete overview and faster feedback
# Job graph:
#   build-all ──┬── lint-and-format   (clippy + fmt)  ─┐
#           └── test-1-thread          ┘  (lint-and-format + test-1-thread parallel after build-all)

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build all targets
        run: cargo test --no-run --all-targets --benches

  lint-and-format:
    runs-on: ubuntu-latest
    needs: build-all
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Format Check Only
        run: cargo fmt --all --check

  test-1-thread:
    runs-on: ubuntu-latest
    needs: build-all
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test -- --test-threads=1
